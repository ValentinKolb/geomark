name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  bun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install runtime tools
        run: sudo apt-get update && sudo apt-get install -y zstd zip unzip

      - name: install dependencies
        run: bun install --frozen-lockfile

      - name: typecheck
        run: bun --filter '*' typecheck

      - name: data tests
        run: bun test packages/data/tests

      - name: web production build
        run: bun --filter @geomark/web build

      - name: api tests
        run: bun --filter @geomark/api test

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: assert production Dockerfiles set NODE_ENV
        run: |
          for file in packages/api/Dockerfile packages/data/Dockerfile packages/web/Dockerfile; do
            if ! awk '
              /^FROM .* AS release$/ { in_release = 1; next }
              /^FROM / && in_release { in_release = 0 }
              in_release && /^ENV NODE_ENV=production$/ { found = 1 }
              END { exit found ? 0 : 1 }
            ' "$file"; then
              echo "::error file=$file::release stage must set ENV NODE_ENV=production"
              exit 1
            fi
          done

      - name: validate development compose
        run: |
          OPENADDRESSES_URL=https://example.com/openaddresses.zip \
            docker compose config >/tmp/geomark-compose.yml

      - name: validate production compose
        run: |
          GEOMARK_VERSION=0.1.4 \
          DOMAIN=geomark.example \
          POSTGRES_PASSWORD=ci-secret \
          OPENADDRESSES_URL=https://example.com/openaddresses.zip \
            docker compose -f compose.prod.yml config >/tmp/geomark-compose-prod.yml

      - name: assert production compose requires postgres password
        run: |
          if GEOMARK_VERSION=0.1.4 \
            DOMAIN=geomark.example \
            OPENADDRESSES_URL=https://example.com/openaddresses.zip \
            docker compose -f compose.prod.yml config >/tmp/geomark-compose-prod-negative.yml 2>/tmp/geomark-compose-prod-negative.err; then
            echo "::error::compose.prod.yml accepted a missing POSTGRES_PASSWORD"
            exit 1
          fi
          grep -q "POSTGRES_PASSWORD is missing" /tmp/geomark-compose-prod-negative.err

      - name: assert production compose requires image version
        run: |
          if DOMAIN=geomark.example \
            POSTGRES_PASSWORD=ci-secret \
            OPENADDRESSES_URL=https://example.com/openaddresses.zip \
            docker compose -f compose.prod.yml config >/tmp/geomark-compose-prod-negative-version.yml 2>/tmp/geomark-compose-prod-negative-version.err; then
            echo "::error::compose.prod.yml accepted a missing GEOMARK_VERSION"
            exit 1
          fi
          grep -q "GEOMARK_VERSION is missing" /tmp/geomark-compose-prod-negative-version.err

      - name: assert production compose requires domain
        run: |
          if GEOMARK_VERSION=0.1.4 \
            POSTGRES_PASSWORD=ci-secret \
            OPENADDRESSES_URL=https://example.com/openaddresses.zip \
            docker compose -f compose.prod.yml config >/tmp/geomark-compose-prod-negative-domain.yml 2>/tmp/geomark-compose-prod-negative-domain.err; then
            echo "::error::compose.prod.yml accepted a missing DOMAIN"
            exit 1
          fi
          grep -q "DOMAIN is missing" /tmp/geomark-compose-prod-negative-domain.err

  docker-build:
    runs-on: ubuntu-latest
    needs: [bun, compose]
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: geomark-api
            file: ./packages/api/Dockerfile
            cache_scope: geomark-api-ci
          - image: geomark-data
            file: ./packages/data/Dockerfile
            cache_scope: geomark-data-ci
          - image: geomark-web
            file: ./packages/web/Dockerfile
            cache_scope: geomark-web-ci
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: build ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: false
          tags: ${{ matrix.image }}:ci
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,scope=${{ matrix.cache_scope }},mode=max
